<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pizza Go - Success</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/payment.css" />
</head>

<body>

  <main class="success-page">

    <div class="card success-card premium-success-card">

     <div
  class="lang-switch-wrap"
  style="display:flex; gap:10px; justify-content:center;"
>

  <button
    id="langToggle"
    class="ghost-btn"
    type="button"
  >
    AR
  </button>

  <button
    class="ghost-btn theme-toggle"
    type="button"
  >
    ☀️ Light
  </button>

</div>

      <div class="success-icon-wrap">
        <div class="success-icon">✓</div>
      </div>

      <p class="eyebrow" data-i18n="successPage.eyebrow">
        Payment Complete
      </p>

      <h1 data-i18n="successPage.title">
        Order placed successfully
      </h1>

      <p data-i18n="successPage.message">
        Your pizza order has been confirmed
        and sent successfully.
      </p>

      <p
  style="
    margin-top:12px;
    opacity:.85;
    font-weight:600;
  "
>
  <span data-i18n="successPage.preparing">
    Your pizza is now being prepared 🍕
  </span>

  <br />

  <span>
    You can track your order live or play while waiting.
  </span>
</p>

<h2 id="orderIdText">
  Order ID: -
</h2>

<div
  class="success-actions"
  style="
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
  "
>

  <a
    class="primary-btn success-link"
    href="./status.html"
  >
    Track Order Status
  </a>

  <a
    class="secondary-btn success-link"
    href="./game.html"
  >
    Play Game
  </a>

  <a
    class="ghost-btn success-link"
    href="./order.html"
    data-i18n="successPage.anotherOrder"
  >
    Make Another Order
  </a>

</div>

    </div>

  </main>

  <script src="../js/lang.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/success.js"></script>

</body>
</html>
