<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Go - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>

  <main class="auth-page">

    <div class="auth-card">

      <div
  class="lang-switch-wrap"
  style="display:flex; gap:10px;"
>

  <button
    id="langToggle"
    class="ghost-btn"
    type="button"
  >
    AR
  </button>

  <button
    class="ghost-btn theme-toggle"
    type="button"
  >
    ☀️ Light
  </button>

</div>

      <h1 data-i18n="global.brand">Pizza Go</h1>

      <p class="muted" data-i18n="loginPage.subtitle">
        Log in to continue
      </p>

      <form id="loginForm">

        <label>
          <span data-i18n="loginPage.email">Email</span>

          <input
            type="email"
            id="loginEmail"
            placeholder="name@example.com"
            required
          />
        </label>

        <label>
          <span data-i18n="loginPage.password">Password</span>

          <input
            type="password"
            id="loginPassword"
            placeholder="Enter password"
            required
          />
        </label>

        <button
          class="primary-btn"
          type="submit"
          data-i18n="global.login"
        >
          Login
        </button>

      </form>

      <p class="switch-link">

        <span data-i18n="loginPage.noAccount">
          Don’t have an account?
        </span>

        <a
          href="./register.html"
          data-i18n="loginPage.createAccount"
        >
          Register
        </a>

      </p>

    </div>

  </main>

  <div class="toast" id="toast"></div>

  <div class="loader hidden" id="loader">

    <div class="loader-card">

      <div class="spinner"></div>

      <p id="loaderText" data-i18n="global.loading">
        Loading...
      </p>

    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/common.js"></script>

  <script src="../js/lang.js"></script>

  <script src="../js/login.js"></script>
  <script src="../js/theme.js"></script>

</body>
</html>
