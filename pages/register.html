<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pizza Go - Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>

  <main class="auth-page">
    <div class="auth-card">

      <div
  class="lang-switch-wrap"
  style="display:flex; gap:10px;"
>

  <button
    id="langToggle"
    class="ghost-btn"
    type="button"
  >
    AR
  </button>

  <button
    class="ghost-btn theme-toggle"
    type="button"
  >
    ☀️ Light
  </button>

</div>

      <h1 data-i18n="registerPage.title">Create Account</h1>

      <p class="muted" data-i18n="registerPage.subtitle">
        Create a new Pizza Go account
      </p>

      <form id="registerForm">

        <label>
          <span data-i18n="registerPage.name">Full Name</span>
          <input
            type="text"
            id="registerName"
            placeholder="Your full name"
            required
          />
        </label>

        <label>
          <span data-i18n="registerPage.email">Email</span>
          <input
            type="email"
            id="registerEmail"
            placeholder="name@example.com"
            required
          />
        </label>

        <label>
          <span data-i18n="registerPage.password">Password</span>
          <input
            type="password"
            id="registerPassword"
            placeholder="At least 6 characters"
            minlength="6"
            required
          />
        </label>

        <button
          class="primary-btn"
          type="submit"
          data-i18n="registerPage.registerButton"
        >
          Register
        </button>

      </form>

      <p class="switch-link">
        <span data-i18n="registerPage.haveAccount">
          Already have an account?
        </span>

        <a href="./login.html" data-i18n="registerPage.loginNow">
          Login
        </a>
      </p>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <div class="loader hidden" id="loader">
    <div class="loader-card">
      <div class="spinner"></div>
      <p id="loaderText" data-i18n="global.loading">Loading...</p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/common.js"></script>

  <script src="../js/lang.js"></script>

  <script src="../js/register.js"></script>
  <script src="./js/theme.js"></script>
</body>
</html>
