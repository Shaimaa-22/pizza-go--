<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <defs>
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5D8C3E"/>
      <stop offset="100%" stop-color="#2E4A1A"/>
    </linearGradient>
    <radialGradient id="oliveInner" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#8B4513" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3E2723" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Olive body -->
  <ellipse cx="50" cy="52" rx="32" ry="42" fill="url(#oliveGrad)"/>
  <ellipse cx="50" cy="52" rx="32" ry="42" fill="url(#oliveInner)"/>
  
  <!-- Inner pit shadow -->
  <ellipse cx="48" cy="55" rx="12" ry="16" fill="#1A0A00" opacity="0.4"/>
  
  <!-- Highlight -->
  <ellipse cx="40" cy="42" rx="8" ry="6" fill="white" opacity="0.1"/>
  
  <!-- Small dot detail -->
  <circle cx="50" cy="30" r="2" fill="#3D6B1A" opacity="0.5"/>
</svg>